<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Design Thinking - Corporativo</title>
    <!-- Importación de Tipografía Asap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --font-sans: 'Asap', sans-serif;
            --color-brand-primary: #ba0020; /* Rojo Corporativo */
            --color-brand-dark: #4e4e4e;    /* Gris Corporativo */
            --color-bg-primary: #ffffff;
            --color-bg-secondary: #f8f9fa;
            --color-text-primary: #202124;
            --color-text-secondary: #4e4e4e;
            --color-text-tertiary: #70757a;
            --color-border: #dadce0;
            --color-info: #ba0020;
            --color-success: #188038;
            --border-radius-md: 8px;
            --border-radius-lg: 12px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); color: var(--color-text-primary); background-color: var(--color-bg-primary); line-height: 1.4; }
        .wrap { padding: 1rem; max-width: 100%; margin: 0 auto; }
        
        /* Barra de Estado */
        .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 0.8rem; font-size: 11px; color: var(--color-text-secondary); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: #FAC775; }
        .status-dot.ok { background: #639922; }
        .status-dot.err { background: var(--color-brand-primary); }
        .status-dot.loading { background: var(--color-brand-primary); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* Métricas */
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1rem; }
        .metric { background: var(--color-bg-secondary); border-radius: var(--border-radius-md); padding: 12px; border-left: 4px solid transparent; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .metric-label { font-size: 10px; color: var(--color-brand-dark); margin-bottom: 2px; font-weight: 700; text-transform: uppercase; }
        .metric-val { font-size: 20px; font-weight: 700; color: var(--color-brand-primary); }

        /* Controles */
        .controls { padding: 15px; background: var(--color-bg-secondary); border-radius: var(--border-radius-md); border: 1px solid var(--color-border); margin-bottom: 1rem; }
        .controls-row { display: flex; flex-wrap: wrap; gap: 15px; align-items: flex-end; }
        .control-group { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 150px; }
        .controls label { font-size: 11px; font-weight: 700; color: var(--color-brand-dark); }
        .controls input, .controls select { font-size: 13px; padding: 8px; border: 1px solid var(--color-border); border-radius: 6px; background: white; outline: none; font-family: var(--font-sans); }
        .controls input:focus, .controls select:focus { border-color: var(--color-brand-primary); }

        /* Chips */
        .month-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 5px; }
        .m-chip { padding: 4px 10px; border-radius: 15px; border: 1px solid var(--color-border); background: white; font-size: 12px; cursor: pointer; transition: all 0.2s; color: var(--color-brand-dark); }
        .m-chip.active { background: var(--color-brand-primary); color: white; border-color: var(--color-brand-primary); font-weight: 600; }

        /* TABLA AJUSTABLE */
        .gantt-outer { overflow-x: auto; border: 1px solid var(--color-border); border-radius: var(--border-radius-lg); margin-bottom: 1.5rem; background: white; max-height: 50vh; overflow-y: auto; }
        table { border-collapse: collapse; width: max-content; min-width: 100%; table-layout: auto; }
        
        .month-h { background: var(--color-brand-dark); font-size: 10px; font-weight: 800; color: #fff; border: 1px solid var(--color-border); text-align: center; text-transform: uppercase; height: 30px; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 40; }
        th { background: #f8f9fa; border: 1px solid var(--color-border); padding: 5px 10px; font-weight: 700; font-size: 10px; color: var(--color-brand-dark); white-space: nowrap; }
        th.left-h { position: sticky; left: 0; z-index: 50; text-align: left; padding-left: 15px; background: #f8f9fa; border-right: 2px solid var(--color-brand-primary); top: 0; }
        
        td { border: 1px solid var(--color-border); padding: 4px 8px; vertical-align: middle; text-align: center; font-size: 12px; }
        td.left-td { position: sticky; left: 0; z-index: 20; text-align: left; padding: 8px 15px; cursor: pointer; border-right: 2px solid var(--color-brand-primary); background: white; white-space: nowrap; transition: background 0.2s; }
        td.left-td:hover { background: #fff5f6; }

        .cell-bar { height: 24px; min-width: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Bitácora Inferior */
        .topic-section { border: 1px solid var(--color-border); border-radius: var(--border-radius-lg); overflow: hidden; background: white; }
        .topic-header { background: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--color-border); }
        .ttable { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
        .ttable th { text-align: left; padding: 10px 15px; background: #f8f9fa; border-bottom: 1px solid var(--color-border); font-weight: 700; color: var(--color-brand-dark); font-size: 10px; text-transform: uppercase; }
        .ttable td { padding: 12px 15px; border-bottom: 1px solid #f1f3f4; vertical-align: top; }
        
        .topic-name { font-size: 14px; font-weight: 700; color: var(--color-text-primary); white-space: nowrap; }
        .topic-desc { font-size: 12px; color: var(--color-brand-dark); margin-top: 4px; line-height: 1.3; max-width: 350px; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .resp-tag-list { display: flex; flex-wrap: wrap; gap: 4px; min-width: 150px; }
        .resp-tag { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; background: #f0f0f0; color: var(--color-brand-dark); border: 1px solid var(--color-border); white-space: nowrap; }

        /* Historial */
        .history-box { background: #fdfdfd; border-radius: 8px; padding: 12px; border: 1px solid #eee; max-height: 350px; overflow-y: auto; }
        .hist-item { font-size: 12px; border-bottom: 1px solid #f1f1f1; padding: 10px 0; display: flex; flex-direction: column; gap: 3px; }
        .hist-item:last-child { border-bottom: none; }
        .hist-meta { display: flex; justify-content: space-between; font-size: 10px; font-weight: 800; color: var(--color-brand-dark); text-transform: uppercase; }
        .hist-date { color: var(--color-brand-primary); }
        .hist-comment { color: #333; line-height: 1.4; word-break: break-word; white-space: pre-line; }

        /* Botones */
        .btn-p { background: var(--color-brand-primary); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 13px; font-family: var(--font-sans); transition: opacity 0.2s; }
        .btn-p:hover { opacity: 0.9; }
        .btn-g { background: white; color: var(--color-brand-dark); border: 1px solid var(--color-border); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: var(--font-sans); }
        .btn-g:hover { border-color: var(--color-brand-dark); }
        .btn-h { background: white; color: var(--color-brand-primary); border: 1px solid var(--color-brand-primary); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; white-space: nowrap; font-family: var(--font-sans); }
        .btn-h:hover { background: #fff5f6; }
        
        .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }

        /* Modales */
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(32, 33, 36, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-bg.open { display: flex; }
        .modal { background: white; border-radius: var(--border-radius-lg); padding: 25px; width: 90%; max-width: 650px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .modal-h { max-width: 500px; }
        .modal label { color: var(--color-brand-dark); }
    </style>
</head>
<body>

<div class="wrap">
    <div class="status-bar">
        <div class="status-dot loading" id="statusDot"></div>
        <span id="statusMsg">Conectando...</span>
        <button onclick="loadAll()" style="margin-left:auto; cursor:pointer; background:none; border:none; font-size:11px; color: var(--color-brand-primary); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;">🔄 ACTUALIZAR</button>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="controls">
        <div class="controls-row">
            <div class="control-group">
                <label>INICIO GANTT</label>
                <input type="date" id="startDate" value="2026-01-01" onchange="render()"/>
            </div>
            <div class="control-group">
                <label>AÑO</label>
                <select id="filterYear" onchange="render()"></select>
            </div>
            <div class="control-group" style="flex: 2;">
                <label>EQUIPO</label>
                <select id="filterResp" onchange="render()"></select>
            </div>
        </div>
        <div id="monthFilterContainer" class="month-chips"></div>
    </div>

    <div class="gantt-outer">
        <table id="ganttTable"></table>
    </div>

    <div class="topic-section">
        <div class="topic-header">
            <h2 style="font-size: 16px; font-weight: 800; color: var(--color-brand-dark)">Bitácora de Seguimiento</h2>
            <button class="btn-p" onclick="openModal(null)">+ Nueva Actividad</button>
        </div>
        <div style="overflow-x: auto;">
            <table class="ttable">
                <thead>
                    <tr>
                        <th>Tema</th>
                        <th>Último Avance</th>
                        <th>Equipo</th>
                        <th>Planificación</th>
                        <th>Fase</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="topicBody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal de Edición -->
<div class="modal-bg" id="modal">
    <div class="modal">
        <h3 id="modalTitle" style="margin-bottom:20px; font-size: 18px; color: var(--color-brand-primary); font-weight: 800;">Detalle de Actividad</h3>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:15px">
            <div>
                <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px">NOMBRE</label>
                <input id="mName" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-family: var(--font-sans);">
            </div>
            <div>
                <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px">FECHA</label>
                <input type="date" id="mDateInput" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-family: var(--font-sans);">
            </div>
        </div>

        <div style="margin-bottom:15px">
            <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px">FASE</label>
            <div id="phaseChips"></div>
        </div>

        <div style="margin-bottom:15px">
            <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px">EQUIPO</label>
            <div id="chipsTeam" style="display:flex; flex-wrap:wrap; gap:4px"></div>
        </div>

        <div style="margin-bottom:10px">
            <label style="display:block; font-size:11px; font-weight:800; margin-bottom:5px">NUEVO MOVIMIENTO</label>
            <textarea id="mDesc" rows="3" placeholder="Escribe aquí el avance..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-family:inherit"></textarea>
        </div>

        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:20px">
            <button class="btn-g" onclick="closeModal()">Cancelar</button>
            <button class="btn-p" onclick="saveModal()">Guardar</button>
        </div>
    </div>
</div>

<!-- Modal de Historial -->
<div class="modal-bg" id="modalHistory">
    <div class="modal modal-h">
        <h3 id="histTitle" style="margin-bottom:5px; font-size: 18px; color: var(--color-brand-primary); font-weight: 800;">Historial de Movimientos</h3>
        <p id="histSubtitle" style="font-size:11px; color:var(--color-brand-dark); margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:10px"></p>
        <div class="history-box" id="histList"></div>
        <div style="display:flex; justify-content: flex-end; margin-top:20px">
            <button class="btn-g" onclick="closeHist()">Cerrar</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVpPGZe_DlIFpi1hQpOAx6l-4l-WL0YHlDPvyRkJXJ__MCU1Z9__oITDvL-S3rCuxv/exec';
    const TEAM = ['Viviana', 'Hadara', 'Cristian', 'Derly', 'Valeria', 'Julian', 'Helen'];
    const MONTH_NAMES = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const PHASES = [
        {k:'E', label:'Empatizar', bg:'#B5D4F4', fill:'#E6F1FB', tc:'#0C447C', color: '#1a73e8'},
        {k:'D', label:'Definir', bg:'#FAC775', fill:'#FAEEDA', tc:'#633806', color: '#f29900'},
        {k:'I', label:'Idear', bg:'#C0DD97', fill:'#EAF3DE', tc:'#3B6D11', color: '#34a853'},
        {k:'P', label:'Prototipar', bg:'#F4C0D1', fill:'#FBEAF0', tc:'#72243E', color: '#d93025'},
        {k:'T', label:'Testear', bg:'#CECBF6', fill:'#EEEDFE', tc:'#3C3489', color: '#7030a0'}
    ];

    let topics = [];
    let editId = null;
    let selPhase = 'E';
    let selResps = [];
    let selectedMonths = [];

    async function loadAll() {
        setStatus('loading', 'Cargando datos...');
        try {
            const res = await fetch(`${SCRIPT_URL}?action=getData&_=${Date.now()}`);
            const data = await res.json();
            topics = (data.topics || []);
            setStatus('ok', 'Actualizado.');
            initFilters();
            render();
        } catch (e) {
            setStatus('err', 'Error de conexión.');
            console.error(e);
        }
    }

    function initFilters() {
        const yearSel = document.getElementById('filterYear');
        const monthContainer = document.getElementById('monthFilterContainer');
        const respSel = document.getElementById('filterResp');
        
        yearSel.innerHTML = '<option value="all">Todos los años</option><option value="2026" selected>2026</option><option value="2027">2027</option>';
        respSel.innerHTML = '<option value="all">Todos los equipos</option>' + TEAM.map(r => `<option value="${r}">${r}</option>`).join('');
        monthContainer.innerHTML = MONTH_NAMES.map((m, idx) => `<div class="m-chip ${selectedMonths.includes(idx) ? 'active' : ''}" onclick="toggleMonthFilter(${idx})">${m}</div>`).join('');
    }

    function toggleMonthFilter(idx) {
        if (selectedMonths.includes(idx)) selectedMonths = selectedMonths.filter(m => m !== idx);
        else selectedMonths.push(idx);
        initFilters(); render();
    }

    function getWeekInfo(startStr, weekIdx) {
        const baseDate = new Date(startStr + 'T12:00:00');
        const dayOfWeek = baseDate.getDay();
        const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        const mondayOfStart = new Date(baseDate);
        mondayOfStart.setDate(baseDate.getDate() + diffToMonday);

        const targetMonday = new Date(mondayOfStart);
        targetMonday.setDate(mondayOfStart.getDate() + (weekIdx * 7));

        return { 
            full: `${targetMonday.getDate()} ${MONTH_NAMES[targetMonday.getMonth()].substring(0,3)}`, 
            monthIdx: targetMonday.getMonth(), 
            year: targetMonday.getFullYear(), 
            monthKey: `${targetMonday.getMonth()}-${targetMonday.getFullYear()}`,
            iso: targetMonday.toISOString().split('T')[0]
        };
    }

    function render() {
        const startStr = document.getElementById('startDate').value;
        const selYear = document.getElementById('filterYear').value;
        const selResp = document.getElementById('filterResp').value;
        const columns = [];
        const monthGroups = new Map();
        const filteredTopics = topics.filter(t => (selResp === "all" || (t.resps && t.resps.includes(selResp))));

        for(let w=0; w < 104; w++) {
            const info = getWeekInfo(startStr, w);
            if ((selYear === "all" || info.year.toString() === selYear) && (selectedMonths.length === 0 || selectedMonths.includes(info.monthIdx))) {
                columns.push({ weekNum: w + 1, info });
                if (!monthGroups.has(info.monthKey)) monthGroups.set(info.monthKey, { label: info.monthIdx, year: info.year, count: 0 });
                monthGroups.get(info.monthKey).count++;
            }
        }

        let mRow = `<th class="left-h"></th>`, wRow = `<th class="left-h">SEGUIMIENTO PROYECTOS</th>`;
        monthGroups.forEach(v => mRow += `<th colspan="${v.count}" class="month-h">${MONTH_NAMES[v.label]} ${v.year}</th>`);
        columns.forEach(c => wRow += `<th>S${c.weekNum}<br><span style="font-weight:400; font-size:8px">${c.info.full}</span></th>`);
        document.getElementById('ganttTable').innerHTML = `<thead><tr>${mRow}</tr><tr>${wRow}</tr></thead><tbody id="ganttBody"></tbody>`;
        
        const body = document.getElementById('ganttBody');
        filteredTopics.forEach(t => {
            const ph = PHASES.find(p => p.k === t.phase);
            const teamStr = (t.resps || []).join(', ');
            let row = `<tr><td class="left-td" onclick="openModal(${t.id})"><div class="topic-name">${t.name}</div><div style="font-size:10px; color:var(--color-brand-primary); font-weight:700">EQUIPO: ${teamStr}</div></td>`;
            columns.forEach(col => row += `<td>${t.week === col.weekNum ? `<div class="cell-bar" style="background:${ph.bg}; color:${ph.tc}">${ph.k}</div>` : ''}</td>`);
            body.innerHTML += row + `</tr>`;
        });

        document.getElementById('topicBody').innerHTML = filteredTopics.map(t => {
            const info = getWeekInfo(startStr, t.week - 1);
            const ph = PHASES.find(p=>p.k==t.phase);
            const lastLog = t.history && t.history.length > 0 ? t.history[t.history.length-1] : { comment: 'Sin registros' };
            return `
                <tr>
                    <td style="font-weight:700; color:var(--color-brand-primary)">${t.name}</td>
                    <td><div class="topic-desc">${lastLog.comment}</div></td>
                    <td><div class="resp-tag-list">${(t.resps || []).map(r => `<span class="resp-tag" style="border-left:3px solid var(--color-brand-primary)">${r}</span>`).join('')}</div></td>
                    <td>Semana ${t.week}<br><small>${info.full}</small></td>
                    <td><span class="tag" style="background:${ph.fill}; color:${ph.tc}">${ph.label}</span></td>
                    <td style="display:flex; gap:5px">
                        <button onclick="openModal(${t.id})" class="btn-g">✏️ Editar</button>
                        <button onclick="openHistory(${t.id})" class="btn-h">📜 Movimientos (${t.history ? t.history.length : 0})</button>
                    </td>
                </tr>`;
        }).join('');
        renderMetrics(filteredTopics);
    }

    function renderMetrics(list) {
        document.getElementById('metrics').innerHTML = PHASES.map(p => `
            <div class="metric" style="border-left-color:${p.color}">
                <div class="metric-label">${p.label}</div>
                <div class="metric-val">${list.filter(t => t.phase === p.k).length}</div>
            </div>`).join('');
    }

    function openModal(id) {
        editId = id;
        const startStr = document.getElementById('startDate').value;
        document.getElementById('mDesc').value = ""; 
        document.getElementById('modalTitle').textContent = id ? "Editar Actividad" : "Nueva Actividad";

        if(id) {
            const t = topics.find(x => x.id.toString() === id.toString());
            document.getElementById('mName').value = t.name;
            document.getElementById('mDateInput').value = getWeekInfo(startStr, t.week-1).iso;
            selPhase = t.phase; 
            selResps = [...(t.resps || [])];
        } else {
            document.getElementById('mName').value = ""; 
            document.getElementById('mDateInput').value = ""; 
            selPhase = 'E'; selResps = [];
        }
        renderChips();
        document.getElementById('modal').classList.add('open');
    }

    function openHistory(id) {
        const t = topics.find(x => x.id.toString() === id.toString());
        if(!t) return;
        document.getElementById('histTitle').textContent = t.name;
        document.getElementById('histSubtitle').textContent = `Responsables Actuales: ${t.resps.join(', ')}`;
        const list = document.getElementById('histList');
        if(t.history && t.history.length > 0) {
            list.innerHTML = [...t.history].reverse().map(h => `
                <div class="hist-item">
                    <div class="hist-meta">
                        <span class="hist-date">📅 ${h.date}</span>
                    </div>
                    <div class="hist-comment">${h.comment}</div>
                </div>`).join('');
        } else {
            list.innerHTML = `<p style="text-align:center; color:#999; padding:20px">No hay movimientos registrados.</p>`;
        }
        document.getElementById('modalHistory').classList.add('open');
    }

    function renderChips() {
        document.getElementById('phaseChips').innerHTML = PHASES.map(p => `<div class="m-chip ${selPhase === p.k ? 'active' : ''}" onclick="selPhase='${p.k}'; renderChips()">${p.label}</div>`).join('');
        document.getElementById('chipsTeam').innerHTML = TEAM.map(m => `<div class="resp-tag" style="cursor:pointer; background:${selResps.includes(m) ? 'var(--color-brand-primary)' : '#fff'}; color:${selResps.includes(m) ? '#fff' : '#000'}" onclick="toggleResp('${m}')">${m}</div>`).join('');
    }

    function toggleResp(n) { if(selResps.includes(n)) selResps = selResps.filter(x => x!==n); else selResps.push(n); renderChips(); }
    function closeModal() { document.getElementById('modal').classList.remove('open'); }
    function closeHist() { document.getElementById('modalHistory').classList.remove('open'); }
    function setStatus(s, m) { document.getElementById('statusDot').className = 'status-dot ' + s; document.getElementById('statusMsg').textContent = m; }
    
    async function saveModal() {
        const name = document.getElementById('mName').value;
        const dateVal = document.getElementById('mDateInput').value;
        const desc = document.getElementById('mDesc').value;
        if(!name || !dateVal) return;
        
        const startDateVal = document.getElementById('startDate').value;
        const start = new Date(startDateVal + 'T12:00:00');
        const sel = new Date(dateVal + 'T12:00:00');
        
        const dayOfWeek = start.getDay();
        const diffToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        start.setDate(start.getDate() + diffToMonday);

        const diffTime = sel.getTime() - start.getTime();
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        const week = Math.floor(diffDays / 7) + 1;
        
        const nowStr = new Date().toLocaleString('es-ES', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        
        let currentTopic;
        let original = null;
        if(editId) {
            original = topics.find(t => t.id.toString() === editId.toString());
            currentTopic = JSON.parse(JSON.stringify(original));
        } else {
            currentTopic = { id: Date.now(), history: [] };
        }

        let summary = editId ? "⚙️ Actualización de detalles:" : "🆕 Actividad creada:";
        let hasChanges = false;

        if(original) {
            if(original.phase !== selPhase) {
                const oldPh = PHASES.find(p => p.k === original.phase)?.label || original.phase;
                const newPh = PHASES.find(p => p.k === selPhase)?.label || selPhase;
                summary += `\n• Fase: ${oldPh} → ${newPh}`;
                hasChanges = true;
            }
            if(original.week !== week) {
                summary += `\n• Fecha: Semana ${original.week} → Semana ${week}`;
                hasChanges = true;
            }
        } else {
            summary += `\n• Equipo: [${selResps.join(', ')}]`;
            hasChanges = true;
        }

        if(hasChanges) currentTopic.history.push({ date: nowStr, comment: summary });
        if(desc.trim()) currentTopic.history.push({ date: nowStr, comment: `📝 Comentario: ${desc.trim()}` });

        currentTopic.name = name; 
        currentTopic.week = week; 
        currentTopic.phase = selPhase; 
        currentTopic.resps = selResps;
        
        setStatus('loading', 'Guardando...');
        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify({ action: 'saveTopic', topic: currentTopic }) 
            });
            closeModal(); 
            setTimeout(loadAll, 1200);
        } catch(e) { 
            setStatus('err', 'Error al guardar.'); 
        }
    }

    loadAll();
</script>
</body>
</html>
